paths:
  molecule: "../structures/mol.vasp"             # Example molecule
  output_prefix: "cands_bulk_test"

settings:
  center_target: "Si"
  rot_steps: 4
  symprec: 0.2
  do_physisorption: true
  do_chemisorption: true
  max_pair_dist: 5.0

ideal_coordination:
  Si: 4
  O: 2

# [NEW] Substrate Generation from Bulk
substrate_generation:
  enabled: true
  bulk_path: "../structures/Si_bulk.vasp"
  miller_indices: [1, 0, 0]
  thickness: 20.0       # Target thickness in Angstroms
  vacuum: 10.0          # Vacuum size (added to both sides)
  target_area: 160.0    # Maximum XY area in Angstrom^2

passivation:
  enabled: true
  element: "H"
  side: "bottom"
  coverage: 1.0
  output_name: "passivated_bulk.vasp"
