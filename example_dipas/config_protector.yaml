paths:
  # substrate: "../structures/SiO2_SAM_substrate.vasp" # Optional if generation is enabled
  molecule: "../structures/TiCl4.vasp"
  output_prefix: "cands_sio2_sam"

# [NEW] Automated Substrate Factory 
substrate_generation:
  enabled: false       # Set to true to generate from bulk
  bulk_path: "../structures/Si_bulk.vasp"
  miller_indices: [1, 0, 0]
  thickness: 20.0
  vacuum: 10.0
  target_area: 160.0    # Maximizes area within this limit
  # supercell_matrix: [[2, 0], [0, 2]] # Optional explicit expansion
  termination: "symmetric" # Options: "none", "symmetric"


settings:
  center_target: "Ti"
  rot_steps: 8
  symprec: 0.2
  do_physisorption: true
  do_chemisorption: true
  max_pair_dist: 5.0

ideal_coordination:
  Si: 4
  O: 2
  Ti: 4
  C: 4

# [NEW] Surface Protector Configuration
protector:
  enabled: true
  
  # Method to separate Protector from Base Substrate
  # Options:
  # - "graph": Uses molecular connectivity to identify the protector vs bulk.
  # - "tag": Explicitly relies on ASE atom tags (e.g. tag=4 for protectors).
  heuristic: "graph"
  # target_tags: [4, 5]  # Used only if heuristic is "tag"
  
  # Voxel cavity detection resolution for Physisorption (Angstroms)
  grid_resolution: 0.2
  
  # Reactive Functional Groups (Leaves) at the top of the protector
  # If the precursor encounters these atoms, it will drop them and undergo Ligand Exchange.
  reactive_leaves: ["OH", "Cl", "H", "F"]

passivation:
  enabled: true
  element: "H"
  side: "bottom"
  coverage: 1.0
  output_name: "passivated_sam.vasp"
