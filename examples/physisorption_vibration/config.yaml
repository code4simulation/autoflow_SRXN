# Physisorption Vibration Analysis: DIPAS on SiO2(001)
# Standardized Example Configuration

paths:
  substrate_bulk: "../../structures/SiO2_mp-546794.vasp"
  adsorbate:      "../../structures/DIPAS.vasp"
  output_dir:     "results"

engine:
  potential:
    backend: "mace"     # "mace" | "sevennet" | "emt"
    device:  "cpu"      # "cpu"  | "cuda"
    dtype:   "float64"
    model:   "small"    # null → default foundation model
    d3:      false      # D3 dispersion correction (mace / sevennet)
    modal:   null       # multi-fidelity modality (sevennet only)
    enable_cueq:  false # cuEquivariance kernel (sevennet only)
    enable_flash: false # FlashAttention         (sevennet only)
    zbl:                # Ziegler-Biersack-Littmark short-range repulsion
      enabled:       false   # set true to activate MLIP + ZBL combination
      cutoff_inner:  1.0     # Å – ZBL fully active below this distance
      cutoff_outer:  2.5     # Å – ZBL smoothly switched off above this
  relaxation:
    fmax:      0.01
    steps:     500
    optimizer: "BFGS"

surface_prep:
  slab_generation:
    miller:             [0, 0, 1]
    thickness_ang:      10.0
    vacuum_ang:         15.0
    target_area_ang2:   100.0
    top_termination:    "O"
    bottom_termination: "O"
  passivation:
    coverage:  1.0
    side:      "both"  # H-passivation on both sides as requested
  equilibration:
    frozen_z_ang: 3.0

analysis:
  vibrational:
    displacement_ang: 0.01
    phva_radius_ang:  6.0
    name: "vib_analysis"
