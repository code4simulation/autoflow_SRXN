# =============================================================================
# AutoFlow-SRXN — Full Configuration Reference
# =============================================================================
# Package purpose:
#   Automated surface reaction pathway explorer for ALD/CVD chemistry.
#   Given a substrate crystal and a precursor molecule, it generates and
#   evaluates all plausible adsorption structures (physisorption, dissociative
#   chemisorption, protector-ligand exchange) through three sequential stages:
#
#   Stage 1 · surface_prep    — build, passivate, and equilibrate the slab
#   Stage 2 · reaction_search — generate and rank adsorption candidates
#   Stage 3 · analysis        — vibrational stability + thermochemical free energies
#
# Potential dependency:
#   Not all sub-steps require an ML potential. Sections that do are marked
#   with [REQUIRES POTENTIAL]. Unmarked sections run on geometry alone,
#   so stages 1 and 2 can be executed without configuring `engine` at all.
# =============================================================================


# -----------------------------------------------------------------------------
# I/O — single source of truth for all file references
# -----------------------------------------------------------------------------
paths:
  substrate_bulk:  "../../structures/SiO2_mp-546794.vasp"  # Bulk crystal (VASP). Used for slab generation.
  substrate_slab:  null                                      # Pre-built slab. When set, slab_generation is skipped.
  adsorbate:       "../../structures/DIPAS.vasp"             # Precursor / adsorbate molecule.
  inhibitor:       null                                      # Inhibitor molecule for 2-step ALD workflows.
  output_dir:      "results"
  output_prefix:   "results"


# -----------------------------------------------------------------------------
# Engine — ML potential + default relaxation/MD parameters
#
# [REQUIRES POTENTIAL] for any workflow step that calls relax() or run_md().
#
# relaxation and md define *defaults* that all potential-requiring steps
# inherit. Override only in the specific stage block that needs different values.
# -----------------------------------------------------------------------------
engine:
  potential:
    # Choice of machine learning interatomic potential (ML-IAP) backend.
    # Supported:
    #   - "mace":     MACE-MP equivariant foundation model. Excellent for general
    #                 crystalline materials and small molecule interactions.
    #   - "sevennet": SevenNet foundation model. Specifically robust for surface 
    #                 catalysis and complex chemical environments.
    #   - "emt":      Effective Medium Theory (built-in to ASE). Extremely fast 
    #                 but lacks chemical accuracy for modern surface modeling.
    #                 Recommended for testing workflow connectivity only.
    backend:  "mace"

    # Hardware device for PyTorch-based potentials.
    # Use "cuda" for GPU acceleration (requires NVIDIA driver + CUDA Toolkit).
    # Use "cpu" if no GPU is available or for very small systems.
    device:   "cpu"

    # Model identifier or local file path.
    #   - For MACE: null defaults to the 'medium' version of mace-mp-0.
    #               Set to 'large' or a local path for custom models.
    #   - For SevenNet: null defaults to '7net-0'. 
    #                   Supports built-in keywords (e.g. '7net-omat24')
    #                   or local file paths (e.g. 'checkpoints/my_model.pth').
    model:    null

    # --- MACE-Specific Parameters ---
    # Floating point precision for Torch calculations.
    #   - "float32": Faster and memory-efficient. Best for long-time MD simulations.
    #   - "float64": High precision (Double Precision). Essential for numerical 
    #                 stabilities during Geometry Optimization and Vibrational Analysis.
    dtype:    "float64"

    # --- SevenNet-Specific Parameters ---
    # Modality for multi-fidelity or specialized SevenNet models.
    # Required for models like OMPA or OMAT which have multiple architectural modes.
    # Examples: "mpa" (Multi-fidelity Potential), "omat24".
    modal:    null

    # D3 (Grimme) Dispersion Correction.
    # Enables empirical van der Waals (vdW) corrections to long-range interactions.
    # Note: Only supported when 'backend' is "sevennet". 
    # Internally, the engine will use SevenNetD3Calculator.
    # 
    # Usage Example:
    #   backend: "sevennet"
    #   d3: true
    d3:       false
    
    # Advanced Hardware Accelerators (requires specific SevenNet installations).
    #   - enable_cueq:  Uses cuEquivariance library for 2x-5x faster tensor ops.
    #   - enable_flash: Uses FlashAttention to reduce memory footprint.
    enable_cueq:  false
    enable_flash: false

    # -------------------------------------------------------------------------
    # QUICK CONFIG EXAMPLES:
    #
    # [EXAMPLE 1: High-Precision MACE Optimization]
    #   backend: "mace", device: "cuda", dtype: "float64"
    #
    # [EXAMPLE 2: SevenNet with Dispersion for Weakly Bound Physisorption]
    #   backend: "sevennet", device: "cuda", d3: true
    #
    # [EXAMPLE 3: Custom Pre-trained SevenNet with Modality]
    #   backend: "sevennet", model: "7net-omat24", modal: "mpa"
    #
    # [EXAMPLE 4: Loading Local Checkpoint]
    #   backend: "sevennet", model: "./models/finetuned_checkpoint.pth"
    # -------------------------------------------------------------------------

  # Default geometry optimization settings.
  # Inherited by surface_prep.slab_relaxation and reaction_search.candidate_relaxation.
  # Override per-stage only when different convergence is needed.
  relaxation:
    fmax:      0.05    # Max-force convergence criterion (eV/Å)
    steps:     200     # Max optimization steps
    optimizer: "BFGS"  # "BFGS" | "FIRE" | "CG_FIRE"
                       #   CG_FIRE: two-stage, SciPyFminCG then FIRE

    # Atom-freezing constraints applied during every relax() call that reads this block.
    # Merged additively with any FixAtoms constraints already set on the atoms object.
    # null → no additional constraint is applied (recommended for gas-phase relaxations).
    frozen_z_ang:     null   # Fix atoms whose z < z_min(atoms) + this value (Å).
    fix_atom_indices: null   # Fix atoms by explicit index list, e.g. [0, 1, 2, 100].
                             # Combined with frozen_z_ang when both are non-null.

  # Default NVT molecular dynamics settings.
  # Inherited by surface_prep.equilibration.
  # Override in the stage block only when different conditions are needed.
  md:
    temperature_K: 500     # Thermostat temperature (K)
    timestep_fs:   1.0     # Integration timestep (fs). 1 fs is safe for most systems.
    md_steps:      2000    # Total integration steps. Wall time ≈ md_steps × timestep_fs fs.
    damping:       100.0   # Langevin friction timescale (fs)

    # Atom-freezing constraints (same semantics as engine.relaxation above):
    # These serve as engine-wide defaults if not overridden in Stage 1/2.
    frozen_z_ang:     null
    fix_atom_indices: null


# -----------------------------------------------------------------------------
# Stage 1 — Surface Preparation
#
# Sub-steps and their potential dependency:
#   slab_generation  — geometry only, no potential
#   passivation      — geometry only, no potential
#   surface_analysis — geometry only, no potential (symmetry + valence rules)
#   slab_relaxation  — [REQUIRES POTENTIAL]  inherits engine.relaxation
#   equilibration    — [REQUIRES POTENTIAL]  inherits engine.md
#
# To run stages 1 and 2 as pure geometry pipelines (e.g., for structure screening),
# set slab_relaxation.enabled: false and equilibration.enabled: false.
# -----------------------------------------------------------------------------
surface_prep:

  # ── Geometry-only ──────────────────────────────────────────────────────────

  slab_generation:
    enabled:            true          # false → load slab directly from paths.substrate_slab
    miller:             [0, 0, 1]     # Miller indices [h, k, l]
    thickness_ang:      15.0          # Slab thickness (Å)
    vacuum_ang:         15.0          # Vacuum padding above and below slab (Å)
    target_area_ang2:   200.0         # Target supercell XY area (Å²). null → minimal unit cell.
    supercell_matrix:   null          # Explicit supercell [[a,b],[c,d]]. Overrides target_area if set.
    top_termination:    "O"           # Element required at the top surface
    bottom_termination: "O"           # Element required at the bottom surface

  passivation:
    enabled:   true
    element:   "H"
    side:      "bottom"  # "top" | "bottom" | "both"
    coverage:  1.0       # Fraction of dangling bonds to saturate (0.0–1.0)

  surface_analysis:
    symprec:             0.2    # Symmetry precision for surface site equivalence (Å)
    ideal_coordination:         # Expected coordination numbers for VSEPR dangling-bond detection
      Si: 4
      O:  2
      N:  3
      C:  4
      H:  1

  # ── Potential-required ─────────────────────────────────────────────────────

  slab_relaxation:               # [REQUIRES POTENTIAL]
    enabled: true
    # Inherits engine.relaxation by default.
    # Uncomment to override for this stage only:
    # fmax:      0.05
    # steps:     200
    # optimizer: "BFGS"

  equilibration:                 # [REQUIRES POTENTIAL]
    enabled:      true
    frozen_z_ang: 5.5    # Stage-specific override: freeze atoms whose z < z_min(slab) + this value (Å).
                         # Overrides engine.md.frozen_z_ang for this stage only.
    # Inherits engine.md defaults. Uncomment to override for this stage only:
    # temperature_K: 500
    # timestep_fs:   1.0
    # md_steps:      2000
    # damping:       100.0


# -----------------------------------------------------------------------------
# Stage 2 — Reaction Search
#
# Sub-steps and their potential dependency:
#   mechanisms       — geometry only, no potential (placement + overlap check)
#   candidate_filter — geometry only, no potential (symmetry deduplication)
#   candidate_relaxation — [REQUIRES POTENTIAL]  inherits engine.relaxation
#
# Candidate generation (mechanisms) can be run without a potential to produce
# a ranked list of starting geometries for external optimization.
# -----------------------------------------------------------------------------
reaction_search:

  # ── Geometry-only ──────────────────────────────────────────────────────────

  mechanisms:
    physisorption:
      enabled:          true
      placement_height: 3.5     # Initial molecule height above top surface layer (Å)
      rot_steps:        8       # Fibonacci-sphere orientations sampled per site

    chemisorption:
      enabled:          true
      precursor_center: "Si"    # Central reactive atom in the adsorbate (for ligand fragmentation)
      rot_steps:        8

    inhibition:
      enabled:          false
      inhibitor_center: "O"     # Binding center element on the inhibitor molecule
      branching_limit:  5       # Max depth for inhibitor fragmentation tree

    protector_exchange:
      enabled:         false
      reactive_leaves: []       # Exchangeable ligand formulas, e.g. ["CH3", "H"]
      cavity_grid_ang: 0.2      # Grid resolution for void-center search inside protector layer (Å)

  candidate_filter:
    overlap_cutoff: 2.5    # Hard rejection: discard poses with any atomic pair below this distance (Å)
    symprec:        0.2    # Symmetry equivalence cutoff for site deduplication (Å)
    max_pair_dist:  5.0    # Max distance between two dangling-bond sites to form a reaction pair (Å)

  # ── Potential-required ─────────────────────────────────────────────────────

  candidate_relaxation:          # [REQUIRES POTENTIAL]
    enabled: true
    # Inherits engine.relaxation by default.
    # Uncomment to use coarser convergence for faster screening:
    # fmax:  0.1
    # steps: 100


# -----------------------------------------------------------------------------
# Stage 3 — Analysis
#
# Sub-steps and their potential dependency:
#   vibrational               — [REQUIRES POTENTIAL]  (Hessian via finite differences)
#   vibrational.mode_refinement — [REQUIRES POTENTIAL]  (relaxation + displacement)
#   thermochemistry           — geometry + frequencies only, no potential
# -----------------------------------------------------------------------------
analysis:

  # ── Potential-required ─────────────────────────────────────────────────────

  vibrational:                   # [REQUIRES POTENTIAL]
    displacement_ang:  0.01      # Finite-difference step for Hessian construction (Å)
    phva_radius_ang:   12.0      # PHVA active region: include substrate atoms within this radius of adsorbate (Å)

    # Path to the phonopy qpoints.yaml consumed by MultiModeFollower.
    # Usage:
    #   null              → VibrationalAnalyzer.generate_qpoints_file() writes "qpoints.yaml"
    #                       to the working directory; MultiModeFollower reads that file.
    #   "path/to/f.yaml"  → Use this specific pre-existing file directly.
    # 
    # IMPORTANT: Use a file-path string or null. Do NOT use boolean (True/False).
    qpoints_file:      null

    mode_refinement:             # [REQUIRES POTENTIAL]
      enabled:            true
      max_iter:           10
      freq_threshold_thz: -0.1   # Follow modes with frequency below this value (THz)
      max_modes:          3      # Max simultaneous modes to follow
      perturbation_alpha: 0.1    # Displacement magnitude along eigenvector (Å)
      max_displacement:   0.3    # Per-atom displacement safety cap (Å)
      stagnation_factor:  0.5    # Multiply alpha by this factor when improvement stalls
      stagnation_epsilon: 0.05   # Min frequency improvement to avoid stagnation trigger (THz)
      # Tighter relaxation than engine.relaxation — explicitly overridden here:
      fmax:  0.001               # eV/Å  (engine default is 0.05)
      steps: 500

    visualization:
      enabled:    true
      n_frames:   10
      output_dir: "mode_anims"

    symmetry:
      enabled: true
      symprec: 1.0e-4

  # ── No potential required ──────────────────────────────────────────────────

  thermochemistry:
    temperatures_K: [298.15, 400.0, 500.0, 600.0, 700.0, 800.0, 900.0, 1000.0]

    gas:
      # mass, moments of inertia, and σ are all auto-derived from paths.adsorbate
      # via spglib point-group analysis. Override only if detection is wrong:
      # mass:    null
      # moments: null
      # sigma:   1

    adsorbent:
      electronic_energy: 0.0    # Reference electronic energy (eV), from MLIP single-point.
